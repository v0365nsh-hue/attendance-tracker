<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #f2f0eb;
  --surface: #ffffff;
  --card: #fafaf8;
  --border: #dedad4;
  --text: #1a1917;
  --muted: #7a7672;
  --accent-green: #2d7a3a;
  --accent-green-bg: #e8f5ea;
  --accent-red: #c0392b;
  --accent-red-bg: #fdecea;
  --accent-blue: #1a4a8a;
  --accent-blue-bg: #e8eef8;
  --tag-present: #2d7a3a;
  --tag-absent: #c0392b;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --radius: 10px;
  --transition: 0.22s ease;
}

body.dark {
  --bg: #111110;
  --surface: #1c1c1a;
  --card: #222220;
  --border: #2e2e2b;
  --text: #f0ede8;
  --muted: #6b6862;
  --accent-green: #5ec96e;
  --accent-green-bg: #162318;
  --accent-red: #e87464;
  --accent-red-bg: #271410;
  --accent-blue: #7aabf0;
  --accent-blue-bg: #111a2a;
  --tag-present: #5ec96e;
  --tag-absent: #e87464;
  --shadow: 0 2px 16px rgba(0,0,0,0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

.app-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
  gap: 12px;
  flex-wrap: wrap;
}

.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text);
}

.header-title span {
  color: var(--accent-green);
}

.theme-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 40px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
  display: flex;
  align-items: center;
  gap: 7px;
}

.theme-btn:hover { border-color: var(--accent-blue); }

/* CARD */
.card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: background var(--transition), border-color var(--transition);
}

.card-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

/* INPUTS ROW */
.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

input[type="text"], input[type="date"], select {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 9px 13px;
  border-radius: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition);
  flex: 1;
  min-width: 140px;
}

input:focus, select:focus { border-color: var(--accent-blue); }

button {
  padding: 9px 18px;
  border-radius: 7px;
  border: 1.5px solid transparent;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}
.btn-primary:hover { opacity: 0.82; }

.btn-green {
  background: var(--accent-green-bg);
  color: var(--accent-green);
  border-color: var(--accent-green);
  font-weight: 500;
}
.btn-green.active, .btn-green:hover {
  background: var(--accent-green);
  color: #fff;
}

.btn-red {
  background: var(--accent-red-bg);
  color: var(--accent-red);
  border-color: var(--accent-red);
  font-weight: 500;
}
.btn-red.active, .btn-red:hover {
  background: var(--accent-red);
  color: #fff;
}

.btn-outline {
  background: transparent;
  color: var(--muted);
  border-color: var(--border);
}
.btn-outline:hover { border-color: var(--text); color: var(--text); }

/* STATS GRID */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin-top: 4px;
}

.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 16px 18px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 9px 0 0 9px;
}

.stat-card.good::before { background: var(--accent-green); }
.stat-card.warn::before { background: var(--accent-red); }

.stat-subject {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
}

.stat-pct {
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card.good .stat-pct { color: var(--accent-green); }
.stat-card.warn .stat-pct { color: var(--accent-red); }

.stat-fraction {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
}

.stat-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 10px;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.stat-card.good .stat-bar-fill { background: var(--accent-green); }
.stat-card.warn .stat-bar-fill { background: var(--accent-red); }

.stat-msg {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 20px;
  display: inline-block;
  font-weight: 500;
}
.stat-card.good .stat-msg {
  background: var(--accent-green-bg);
  color: var(--accent-green);
}
.stat-card.warn .stat-msg {
  background: var(--accent-red-bg);
  color: var(--accent-red);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 22px;
  border-radius: 40px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* TABLE */
.table-wrap {
  overflow-x: auto;
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1.5px solid var(--border);
}

td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }

tr:hover td { background: var(--surface); }

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.tag.present {
  background: var(--accent-green-bg);
  color: var(--tag-present);
}
.tag.absent {
  background: var(--accent-red-bg);
  color: var(--tag-absent);
}

.no-data {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 28px 0;
}

/* export row */
.export-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 12px;
}

@media (max-width: 560px) {
  .header-title { font-size: 22px; }
  .stat-pct { font-size: 22px; }
}
</style>
</head>

<body>
<div class="app-wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">attend<span>.</span>track</div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
      <span id="themeIcon">🌙</span> <span id="themeLabel">Dark Mode</span>
    </button>
  </div>

  <!-- ADD SUBJECT -->
  <div class="card">
    <div class="card-label">Add Subject</div>
    <div class="row">
      <input type="text" id="subjectInput" placeholder="e.g. Mathematics, Physics…"/>
      <button class="btn-primary" onclick="addSubject()">+ Add Subject</button>
    </div>
  </div>

  <!-- LOG ENTRY -->
  <div class="card">
    <div class="card-label">Log Attendance</div>
    <div class="row">
      <select id="logSubject"></select>
      <input type="date" id="logDate"/>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="btn-green active" id="btnPresent" onclick="setAttendance('present')">✔ Present</button>
      <button class="btn-red" id="btnAbsent" onclick="setAttendance('absent')">✘ Absent</button>
      <button class="btn-primary" onclick="logEntry()">Add Entry</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="card">
    <div class="card-label">Attendance Overview</div>
    <div class="stats-grid" id="stats">
      <div class="no-data">No data yet — add subjects and log entries.</div>
    </div>
  </div>

  <!-- LOGS TABLE -->
  <div class="card">
    <div class="card-label">All Logs</div>
    <div class="export-row">
      <button class="btn-outline" onclick="downloadExcel()">⬇ Export Excel</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Subject</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="logs"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let subjects = JSON.parse(localStorage.getItem('att_subjects') || '[]');
let logs = JSON.parse(localStorage.getItem('att_logs') || '[]');
let attendance = 'present';

// Set today's date
document.getElementById('logDate').value = new Date().toISOString().split('T')[0];

// Apply saved theme
if (localStorage.getItem('att_theme') === 'dark') {
  document.body.classList.add('dark');
  document.getElementById('themeIcon').textContent = '☀️';
  document.getElementById('themeLabel').textContent = 'Light Mode';
}

function save() {
  localStorage.setItem('att_subjects', JSON.stringify(subjects));
  localStorage.setItem('att_logs', JSON.stringify(logs));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('att_theme', isDark ? 'dark' : 'light');
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isDark ? 'Light Mode' : 'Dark Mode';
}

function addSubject() {
  const val = document.getElementById('subjectInput').value.trim();
  if (!val) return showToast('Enter a subject name.');
  if (subjects.includes(val)) return showToast(`"${val}" already exists.`);
  subjects.push(val);
  document.getElementById('subjectInput').value = '';
  save();
  render();
  showToast(`✔ Subject "${val}" added.`);
}

function setAttendance(val) {
  attendance = val;
  document.getElementById('btnPresent').classList.toggle('active', val === 'present');
  document.getElementById('btnAbsent').classList.toggle('active', val === 'absent');
}

function logEntry() {
  const subject = document.getElementById('logSubject').value;
  const date = document.getElementById('logDate').value;
  if (!subject || !date) return showToast('Select subject and date.');

  logs.push({ subject, date, status: attendance });
  save();
  render();
  showToast(attendance === 'present' ? `✔ Marked present for ${subject}` : `✘ Marked absent for ${subject}`);
}

function calcStats(subject) {
  const subLogs = logs.filter(l => l.subject === subject);
  const total = subLogs.length;
  const present = subLogs.filter(l => l.status === 'present').length;
  const pct = total === 0 ? 0 : Math.round((present / total) * 100);

  let needed = 0;
  if (total > 0 && pct < 75) {
    while (((present + needed) / (total + needed)) * 100 < 75) needed++;
  }

  // How many classes can be skipped
  let canSkip = 0;
  if (pct >= 75 && total > 0) {
    while (((present) / (total + canSkip + 1)) * 100 >= 75) canSkip++;
  }

  return { total, present, pct, needed, canSkip };
}

function render() {
  // Dropdown
  const sel = document.getElementById('logSubject');
  sel.innerHTML = subjects.length
    ? subjects.map(s => `<option>${s}</option>`).join('')
    : '<option disabled>No subjects yet</option>';

  // Logs table
  const tbody = document.getElementById('logs');
  if (logs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="no-data">No entries logged yet.</td></tr>`;
  } else {
    tbody.innerHTML = [...logs].reverse().map((l, i) =>
      `<tr>
        <td style="color:var(--muted)">${logs.length - i}</td>
        <td>${l.subject}</td>
        <td>${l.date}</td>
        <td><span class="tag ${l.status}">${l.status === 'present' ? '✔ Present' : '✘ Absent'}</span></td>
      </tr>`
    ).join('');
  }

  renderStats();
}

function renderStats() {
  const statsEl = document.getElementById('stats');
  const allSubjects = [...new Set([...subjects, ...logs.map(l => l.subject)])];

  if (allSubjects.length === 0) {
    statsEl.innerHTML = `<div class="no-data">No data yet — add subjects and log entries.</div>`;
    return;
  }

  statsEl.innerHTML = allSubjects.map(s => {
    const { total, present, pct, needed, canSkip } = calcStats(s);
    const good = pct >= 75;
    const cls = good ? 'good' : 'warn';

    let msg = '';
    if (total === 0) {
      msg = '— No entries yet';
    } else if (good) {
      msg = canSkip > 0
        ? `😎 Can skip ${canSkip} class${canSkip > 1 ? 'es' : ''}`
        : '✅ Good to go!';
    } else {
      msg = `📚 Attend ${needed} more class${needed > 1 ? 'es' : ''}`;
    }

    return `<div class="stat-card ${cls}">
      <div class="stat-subject">${s}</div>
      <div class="stat-pct">${total === 0 ? '—' : pct + '%'}</div>
      <div class="stat-fraction">${present} present / ${total} total</div>
      <div class="stat-bar">
        <div class="stat-bar-fill" style="width:${Math.min(pct,100)}%"></div>
      </div>
      <span class="stat-msg">${msg}</span>
    </div>`;
  }).join('');
}

function downloadExcel() {
  if (logs.length === 0) return showToast('No data to export.');

  const headerRow = ['#', 'Subject', 'Date', 'Status'];

  const dataRows = logs.map((l, i) => [
    { v: i + 1, t: 'n' },
    { v: l.subject, t: 's' },
    { v: l.date, t: 's' },
    {
      v: l.status.charAt(0).toUpperCase() + l.status.slice(1),
      t: 's',
      s: {
        font: {
          bold: true,
          color: { rgb: l.status === 'present' ? '1B7E2A' : 'C0392B' }
        },
        fill: {
          patternType: 'solid',
          fgColor: { rgb: l.status === 'present' ? 'E8F5EA' : 'FDECEA' }
        }
      }
    }
  ]);

  // Build header with styling
  const styledHeader = headerRow.map(h => ({
    v: h,
    t: 's',
    s: {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { patternType: 'solid', fgColor: { rgb: '1A1917' } },
      alignment: { horizontal: 'center' }
    }
  }));

  const ws = XLSX.utils.aoa_to_sheet([styledHeader, ...dataRows]);

  // Set column widths
  ws['!cols'] = [
    { wch: 5 }, { wch: 22 }, { wch: 14 }, { wch: 14 }
  ];

  // Style the number and text cells (non-status)
  logs.forEach((_, i) => {
    ['A', 'B', 'C'].forEach(col => {
      const ref = col + (i + 2);
      if (ws[ref]) {
        ws[ref].s = {
          font: { color: { rgb: '1A1917' } },
          alignment: { horizontal: col === 'A' ? 'center' : 'left' }
        };
      }
    });
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Attendance');
  XLSX.writeFile(wb, 'attendance.xlsx');
  showToast('✔ Excel exported!');
}

render();
</script>
</body>
</html>
